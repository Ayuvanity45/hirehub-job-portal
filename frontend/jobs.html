<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Jobs | HireHub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.hero-search{

background:linear-gradient(135deg,#2563eb,#1d4ed8);

padding:70px 40px;

border-radius:24px;

color:white;

margin-bottom:40px;

}

.hero-search h1{

font-size:46px;

margin:0 0 15px;

}

.hero-search p{

font-size:18px;

opacity:.9;

margin-bottom:30px;

}

.search-box{

display:grid;

grid-template-columns:2fr 1fr 1fr auto;

gap:15px;

}

.search-box input,

.search-box select{

padding:14px;

border:none;

border-radius:12px;

font-size:15px;

}

.search-box button{

border:none;

background:#0f172a;

color:white;

padding:14px 24px;

border-radius:12px;

cursor:pointer;

font-weight:600;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:40px;

}

.stat-card{

background:white;

padding:25px;

border-radius:18px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.stat-card h2{

margin:0;

font-size:34px;

color:#2563eb;

}

.stat-card p{

margin-top:8px;

color:#64748b;

}

.jobs-grid{

display:grid;

gap:20px;

}

.job-card{

background:white;

padding:28px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

display:flex;

justify-content:space-between;

align-items:center;

transition:.3s;

text-decoration:none;

color:inherit;

}

.job-card:hover{

transform:translateY(-5px);

}

.company{

display:flex;

gap:18px;

align-items:flex-start;

}

.company-logo{

width:65px;

height:65px;

border-radius:16px;

background:#dbeafe;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

flex-shrink:0;

}

.job-title{

font-size:24px;

font-weight:700;

margin-bottom:6px;

color:#0f172a;

}

.company-name{

font-size:17px;

font-weight:600;

color:#2563eb;

margin-bottom:10px;

}

.job-meta{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-bottom:14px;

}

.meta{

background:#eff6ff;

padding:8px 14px;

border-radius:20px;

font-size:14px;

font-weight:600;

color:#1d4ed8;

}

.skills{

display:flex;

flex-wrap:wrap;

gap:10px;

}

.skill{

background:#dbeafe;

color:#1d4ed8;

padding:8px 14px;

border-radius:30px;

font-size:13px;

font-weight:600;

}

.job-right{

text-align:right;

display:flex;

flex-direction:column;

gap:15px;

}

.salary{

font-size:20px;

font-weight:700;

color:#16a34a;

}

.apply-btn{

background:#2563eb;

color:white;

padding:12px 22px;

border-radius:12px;

font-weight:600;

}

.new-badge{

background:#22c55e;

color:white;

padding:6px 12px;

border-radius:999px;

font-size:12px;

display:inline-block;

}

@media(max-width:900px){

.search-box{

grid-template-columns:1fr;

}

.stats{

grid-template-columns:1fr 1fr;

}

.job-card{

flex-direction:column;

align-items:flex-start;

gap:20px;

}

.job-right{

text-align:left;

}

}

@media(max-width:600px){

.stats{

grid-template-columns:1fr;

}

.hero-search h1{

font-size:34px;

}

}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="page">

<div class="container">

<div class="hero-search">

<h1>

Find Your Dream Job

</h1>

<p>

Search thousands of verified opportunities from leading companies.

</p>

<form id="filter-form" class="search-box">

<input

type="text"

id="keyword"

placeholder="Job title, skills or company">

<input

type="text"

id="location"

placeholder="Location">

<select id="job_type">

<option value="">All Types</option>

<option value="Full-time">Full Time</option>

<option value="Part-time">Part Time</option>

<option value="Internship">Internship</option>

<option value="Contract">Contract</option>

<option value="Remote">Remote</option>

</select>

<button type="submit">

Search

</button>

</form>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="jobCount">

0

</h2>

<p>

Open Jobs

</p>

</div>

<div class="stat-card">

<h2>

500+

</h2>

<p>

Companies

</p>

</div>

<div class="stat-card">

<h2>

120+

</h2>

<p>

Locations

</p>

</div>

<div class="stat-card">

<h2>

10K+

</h2>

<p>

Candidates

</p>

</div>

</div>

<div

id="results-count"

class="muted"

style="margin-bottom:18px;">

</div>

<div

id="job-list"

class="jobs-grid">

Loading...

</div>

</div>

</div>
<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script>

const jobList=document.getElementById("job-list");

const resultsCount=document.getElementById("results-count");

const jobCounter=document.getElementById("jobCount");

function isNewJob(date){

const created=new Date(date);

const today=new Date();

const diff=(today-created)/(1000*60*60*24);

return diff<=7;

}

function formatSalary(job){

if(job.salary_min||job.salary_max){

return `₹${job.salary_min||"—"} - ₹${job.salary_max||"—"} / year`;

}

return "Salary Negotiable";

}

function skillHTML(job){

if(!job.skills){

return "";

}

return job.skills

.split(",")

.slice(0,4)

.map(skill=>`

<span class="skill">

${skill.trim()}

</span>

`)

.join("");

}

function jobCardHTML(job){

return `

<a

href="job-detail.html?id=${job.id}"

class="job-card">

<div class="company">

<div class="company-logo">

💼

</div>

<div>

<div class="job-title">

${job.title}

</div>

<div class="company-name">

${job.company}

</div>

<div class="job-meta">

<div class="meta">

📍 ${job.location}

</div>

<div class="meta">

💼 ${job.job_type}

</div>

</div>

<div class="skills">

${skillHTML(job)}

</div>

</div>

</div>

<div class="job-right">

${

isNewJob(job.created_at)

?

`<span class="new-badge">

NEW

</span>`

:

""

}

<div class="salary">

${formatSalary(job)}

</div>

<div style="color:#64748b;font-size:14px;">

Posted

${new Date(job.created_at).toLocaleDateString()}

</div>

<div class="apply-btn">

View Details →

</div>

</div>

</a>

`;

}

async function loadJobs(params={}){

jobList.innerHTML=`

<div class="center">

<h3>

Loading Jobs...

</h3>

<p class="muted">

Please wait.

</p>

</div>

`;

const query=new URLSearchParams(params).toString();

try{

const jobs=await apiRequest(

`/jobs${query?`?${query}`:""}`

);

jobCounter.textContent=jobs.length;

resultsCount.innerHTML=`

<strong>

${jobs.length}

</strong>

job${jobs.length!==1?"s":""}

found

`;

if(!jobs.length){

jobList.innerHTML=`

<div class="card center">

<h2>

🔍

</h2>

<h3>

No Jobs Found

</h3>

<p class="muted">

Try changing your search filters.

</p>

</div>

`;

return;

}

jobList.innerHTML=jobs

.map(job=>jobCardHTML(job))

.join("");
        }

        catch(err){

            jobList.innerHTML = `

            <div class="card center">

                <h2>

                    ⚠️

                </h2>

                <h3>

                    Failed to Load Jobs

                </h3>

                <p class="muted">

                    ${err.message}

                </p>

                <button

                    class="btn btn-primary"

                    onclick="loadJobs()">

                    Try Again

                </button>

            </div>

            `;

        }

    }



    document

    .getElementById("filter-form")

    .addEventListener("submit",(e)=>{

        e.preventDefault();

        loadJobs({

            keyword:document

                .getElementById("keyword")

                .value

                .trim(),

            location:document

                .getElementById("location")

                .value

                .trim(),

            job_type:document

                .getElementById("job_type")

                .value

        });

    });



    /* Auto Search */

    document

    .getElementById("keyword")

    .addEventListener("keyup",(e)=>{

        if(e.key==="Enter"){

            e.preventDefault();

            document

            .getElementById("filter-form")

            .dispatchEvent(

                new Event("submit")

            );

        }

    });



    /* Initial Load */

    loadJobs();

</script>

</body>

</html>
