<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Dashboard | HireHub</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f8fafc;
color:#1e293b;
}

.page{
padding:30px 0;
}

.container{
width:90%;
max-width:1250px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:40px;
border-radius:22px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:35px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

.post-btn{
background:white;
color:#2563eb;
text-decoration:none;
padding:14px 22px;
border-radius:12px;
font-weight:700;
transition:.3s;
}

.post-btn:hover{
transform:translateY(-2px);
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
font-size:34px;
color:#2563eb;
margin-bottom:10px;
}

.card p{
color:#64748b;
font-weight:600;
}

.toolbar{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.toolbar input,
.toolbar select{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #cbd5e1;
font-size:15px;
outline:none;
}

.job-list{
display:grid;
gap:22px;
}

.job-card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
display:flex;
justify-content:space-between;
gap:25px;
}

.job-info{
flex:1;
}

.job-info h3{
font-size:24px;
margin-bottom:10px;
}

.job-info a{
text-decoration:none;
color:#0f172a;
}

.meta{
margin:8px 0;
color:#64748b;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:700;
margin-top:10px;
}

.open{
background:#dcfce7;
color:#15803d;
}

.closed{
background:#fee2e2;
color:#dc2626;
}

.side{
width:220px;
display:flex;
flex-direction:column;
justify-content:center;
}

.side h2{
text-align:center;
font-size:34px;
margin-bottom:8px;
}

.side p{
text-align:center;
color:#64748b;
margin-bottom:18px;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.btn-blue{
background:#2563eb;
color:white;
text-decoration:none;
padding:10px 18px;
border-radius:10px;
}

.btn-danger{
background:#dc2626;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

.empty{
background:white;
padding:60px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

@media(max-width:900px){

.stats{
grid-template-columns:repeat(2,1fr);
}

.job-card{
flex-direction:column;
}

.side{
width:100%;
}

}

@media(max-width:650px){

.stats{
grid-template-columns:1fr;
}

.hero{
text-align:center;
justify-content:center;
}

}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="page">

<div class="container">

<div class="hero">

<div>

<h1>Recruiter Dashboard</h1>

<p>
Manage all your job postings and applicants from one place.
</p>

</div>

<a
href="post-job.html"
class="post-btn">

+ Post Job

</a>

</div>
<div class="stats">

<div class="card">

<h2 id="totalJobs">0</h2>

<p>Total Jobs</p>

</div>

<div class="card">

<h2 id="openJobs">0</h2>

<p>Open Jobs</p>

</div>

<div class="card">

<h2 id="closedJobs">0</h2>

<p>Closed Jobs</p>

</div>

<div class="card">

<h2 id="totalApplicants">0</h2>

<p>Total Applicants</p>

</div>

</div>

<div class="toolbar">

<input
type="text"
id="searchBox"
placeholder="🔍 Search jobs by title...">

<select id="statusFilter">

<option value="all">

All Jobs

</option>

<option value="open">

Open Jobs

</option>

<option value="closed">

Closed Jobs

</option>

</select>

</div>

<div
id="jobList"
class="job-list">

<div class="empty">

<div style="font-size:70px;">

⏳

</div>

<h2 style="margin:15px 0;">

Loading Dashboard...

</h2>

<p style="color:#64748b;">

Please wait while we fetch your job postings.

</p>

</div>

</div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script>

requireAuth("recruiter");

const jobList=document.getElementById("jobList");

const totalJobs=document.getElementById("totalJobs");
const openJobs=document.getElementById("openJobs");
const closedJobs=document.getElementById("closedJobs");
const totalApplicants=document.getElementById("totalApplicants");

const searchBox=document.getElementById("searchBox");
const statusFilter=document.getElementById("statusFilter");

let jobs=[];

function jobCard(job){

return `

<div class="job-card">

<div class="job-info">

<h3>

<a href="job-detail.html?id=${job.id}">

${job.title}

</a>

</h3>

<p class="meta">

🏢 ${job.company}

</p>

<p class="meta">

📍 ${job.location}

</p>

<p class="meta">

💼 ${job.job_type}

</p>

<span class="badge ${job.status==="open"?"open":"closed"}">

${job.status.toUpperCase()}

</span>

</div>

<div class="side">

<h2>

${job.applicant_count}

</h2>

<p>

Applicants

</p>

<div class="actions">

<a
href="applicants.html?jobId=${job.id}"
class="btn-blue">

Applicants

</a>

<button
class="btn-danger"
onclick="deleteJob(${job.id})">

Delete

</button>

</div>

</div>

</div>

`;

}
function updateStats(){

totalJobs.textContent=jobs.length;

openJobs.textContent=
jobs.filter(job=>job.status==="open").length;

closedJobs.textContent=
jobs.filter(job=>job.status==="closed").length;

totalApplicants.textContent=
jobs.reduce(
(sum,job)=>sum+Number(job.applicant_count),
0
);

}

function renderJobs(data){

if(data.length===0){

jobList.innerHTML=`

<div class="empty">

<div style="font-size:70px;">

📋

</div>

<h2 style="margin:15px 0;">

No Jobs Found

</h2>

<p style="color:#64748b;">

Try changing your search or post a new job.

</p>

<br>

<a
href="post-job.html"
class="btn-blue">

Post Your First Job

</a>

</div>

`;

return;

}

jobList.innerHTML=data.map(jobCard).join("");

}

async function loadDashboard(){

try{

jobList.innerHTML=`

<div class="empty">

<div style="font-size:70px;">

⏳

</div>

<h2 style="margin:15px 0;">

Loading Dashboard...

</h2>

</div>

`;

jobs=await apiRequest("/jobs/my");

updateStats();

renderJobs(jobs);

}

catch(error){

jobList.innerHTML=`

<div class="empty">

<div style="font-size:70px;">

❌

</div>

<h2 style="margin:15px 0;">

${error.message}

</h2>

</div>

`;

}

}

function filterJobs(){

const search=
searchBox.value
.toLowerCase()
.trim();

const status=
statusFilter.value;

const filtered=jobs.filter(job=>{

const matchTitle=
job.title
.toLowerCase()
.includes(search);

const matchStatus=
status==="all" ||
job.status===status;

return matchTitle && matchStatus;

});

renderJobs(filtered);

}

searchBox.addEventListener(
"input",
filterJobs
);

statusFilter.addEventListener(
"change",
filterJobs
);
async function deleteJob(id){

const confirmDelete=confirm(
"Are you sure you want to delete this job?"
);

if(!confirmDelete) return;

try{

await apiRequest(`/jobs/${id}`,"DELETE");

showToast("Job deleted successfully!");

await loadDashboard();

}

catch(error){

alert(error.message);

}

}

function showToast(message){

const toast=document.createElement("div");

toast.textContent=message;

toast.style.position="fixed";
toast.style.bottom="30px";
toast.style.right="30px";
toast.style.background="#2563eb";
toast.style.color="#fff";
toast.style.padding="14px 22px";
toast.style.borderRadius="12px";
toast.style.boxShadow="0 10px 25px rgba(0,0,0,.2)";
toast.style.fontWeight="600";
toast.style.zIndex="9999";
toast.style.opacity="0";
toast.style.transition="all .3s ease";

document.body.appendChild(toast);

setTimeout(()=>{
toast.style.opacity="1";
},50);

setTimeout(()=>{

toast.style.opacity="0";

setTimeout(()=>{
toast.remove();
},300);

},2500);

}

loadDashboard();

</script>

</body>

</html>
