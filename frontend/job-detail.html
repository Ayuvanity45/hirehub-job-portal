<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details | HireHub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.job-layout{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;

align-items:start;

}

.job-main{

display:flex;

flex-direction:column;

gap:25px;

}

.job-sidebar{

position:sticky;

top:95px;

}

.hero-card{

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.company-logo{

width:70px;

height:70px;

border-radius:18px;

background:#dbeafe;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

margin-bottom:18px;

}

.job-title{

font-size:38px;

font-weight:700;

color:#0f172a;

margin-bottom:10px;

}

.company-name{

font-size:20px;

font-weight:600;

color:#2563eb;

margin-bottom:20px;

}

.job-info{

display:flex;

flex-wrap:wrap;

gap:15px;

margin-bottom:20px;

}

.info-box{

background:#eff6ff;

padding:10px 18px;

border-radius:12px;

font-weight:600;

color:#1e3a8a;

}

.skills{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-top:18px;

}

.skill{

background:#dbeafe;

color:#1d4ed8;

padding:8px 15px;

border-radius:30px;

font-size:14px;

font-weight:600;

}

.section-card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.section-card h2{

margin-top:0;

margin-bottom:15px;

}

.section-card p{

line-height:1.8;

color:#475569;

}

.apply-card{

background:white;

padding:28px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.upload-box{

border:2px dashed #cbd5e1;

border-radius:16px;

padding:25px;

text-align:center;

cursor:pointer;

transition:.3s;

margin-bottom:18px;

}

.upload-box:hover{

border-color:#2563eb;

background:#eff6ff;

}

.upload-box span{

font-size:42px;

display:block;

margin-bottom:12px;

}

.upload-box input{

display:none;

}

textarea{

min-height:130px;

}

.related-jobs{

display:grid;

gap:15px;

}

.related-card{

background:white;

padding:20px;

border-radius:16px;

box-shadow:0 8px 18px rgba(0,0,0,.06);

display:flex;

justify-content:space-between;

align-items:center;

}

.related-card a{

text-decoration:none;

background:#2563eb;

color:white;

padding:10px 18px;

border-radius:10px;

}

@media(max-width:900px){

.job-layout{

grid-template-columns:1fr;

}

.job-sidebar{

position:static;

}

.job-title{

font-size:30px;

}

}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="page">

<div class="container">

<div id="job-detail">

Loading...

</div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script>

const params=new URLSearchParams(window.location.search);

const jobId=params.get("id");

const detailEl=document.getElementById("job-detail");

const user=getUser();

function applySectionHTML(job){

if(!user){

return `

<div class="apply-card">

<h2>Apply for this Job</h2>

<p class="muted">

Please login as a candidate to apply.

</p>

<a href="login.html" class="btn btn-primary">

Login

</a>

</div>

`;

}

if(user.role==="recruiter"){

return `

<div class="apply-card">

<h2>Recruiter Account</h2>

<p class="muted">

Recruiters cannot apply to jobs.

</p>

</div>

`;

}

return `

<div class="apply-card">

<h2>

Apply Now

</h2>

<div id="apply-alert"></div>

<form id="apply-form">

<label class="upload-box">

<span>📄</span>

<strong>

Click to Upload Resume

</strong>

<br>

<small>

PDF / DOC / DOCX

</small>

<input

type="file"

id="resume"

accept=".pdf,.doc,.docx"

required>

</label>

<label>

Cover Letter

</label>

<textarea

id="cover_letter"

placeholder="Write a short cover letter...">

</textarea>

<button

class="btn btn-primary btn-block"

type="submit">

Submit Application

</button>

</form>

</div>

`;

}
async function loadJob() {

try {

const job = await apiRequest(`/jobs/${jobId}`);

const salary =
(job.salary_min || job.salary_max)
? `₹${job.salary_min || "—"} - ₹${job.salary_max || "—"} / year`
: "Salary Not Disclosed";

const skills = job.skills
? job.skills.split(",").map(skill =>
`<span class="skill">${skill.trim()}</span>`
).join("")
: "<span class='muted'>No skills specified</span>";

detailEl.innerHTML = `

<div class="job-layout">

<div class="job-main">

<div class="hero-card">

<div class="company-logo">

💼

</div>

<div class="company-name">

${job.company}

</div>

<div class="job-title">

${job.title}

</div>

<div class="job-info">

<div class="info-box">

📍 ${job.location}

</div>

<div class="info-box">

💼 ${job.job_type}

</div>

<div class="info-box">

💰 ${salary}

</div>

<div class="info-box">

👤 ${job.recruiter_name}

</div>

</div>

<div class="skills">

${skills}

</div>

</div>

<div class="section-card">

<h2>

Job Description

</h2>

<p>

${job.description.replace(/\n/g,"<br>")}

</p>

</div>

<div class="section-card">

<h2>

Why Join Us?

</h2>

<p>

• Competitive salary package<br><br>

• Collaborative working environment<br><br>

• Career growth opportunities<br><br>

• Flexible work culture<br><br>

• Health & employee benefits

</p>

</div>

<div class="section-card">

<h2>

Similar Jobs

</h2>

<div class="related-jobs">

<div class="related-card">

<div>

<strong>

Java Backend Developer

</strong>

<br>

Google

</div>

<a href="jobs.html">

View

</a>

</div>

<div class="related-card">

<div>

<strong>

Software Engineer

</strong>

<br>

Microsoft

</div>

<a href="jobs.html">

View

</a>

</div>

<div class="related-card">

<div>

<strong>

Full Stack Developer

</strong>

<br>

Amazon

</div>

<a href="jobs.html">

View

</a>

</div>

</div>

</div>

</div>

<div class="job-sidebar">

${applySectionHTML(job)}

</div>

</div>

`;

const form = document.getElementById("apply-form");

if(form){

form.addEventListener("submit", async(e)=>{

e.preventDefault();

const alertBox=document.getElementById("apply-alert");

alertBox.innerHTML="";

const resume=document.getElementById("resume");

if(!resume.files.length){

alertBox.innerHTML=`

<div class="alert alert-error">

Please upload your resume.

</div>

`;

return;

}

const formData=new FormData();

formData.append("resume",resume.files[0]);

formData.append(

"cover_letter",

document.getElementById("cover_letter").value.trim()

);

try{

await apiRequest(

`/applications/${jobId}`,

{

method:"POST",

body:formData,

isFormData:true

}

);

alertBox.innerHTML=`

<div class="alert alert-success">

✅ Application submitted successfully!

You can track it from

<strong>

My Applications

</strong>.

</div>

`;

form.reset();

}

catch(err){

alertBox.innerHTML=`

<div class="alert alert-error">

${err.message}

</div>

`;

}

});

}

}

catch(err){

detailEl.innerHTML=`

<div class="card center">

<h2>

Something went wrong

</h2>

<p class="muted">

${err.message}

</p>

<a href="jobs.html" class="btn btn-primary">

Back to Jobs

</a>

</div>

`;

}

}

loadJob();

</script>

</body>

</html>
