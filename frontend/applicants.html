<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Management | HireHub</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            background:#f5f7fb;
        }

        .page{
            padding:40px 0;
        }

        .page-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            margin-bottom:30px;
        }

        .page-title h1{
            font-size:34px;
            color:#1e293b;
            margin-bottom:8px;
        }

        .page-title p{
            color:#64748b;
            font-size:15px;
        }

        .back-btn{
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
        }

        .stats-grid{

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
            margin-bottom:35px;

        }

        .stat-card{

            background:white;
            border-radius:16px;
            padding:24px;
            box-shadow:0 8px 24px rgba(0,0,0,.06);
            transition:.3s;

        }

        .stat-card:hover{

            transform:translateY(-5px);

        }

        .stat-title{

            color:#64748b;
            font-size:14px;
            margin-bottom:10px;

        }

        .stat-value{

            font-size:34px;
            font-weight:700;
            color:#0f172a;

        }

        .toolbar{

            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:25px;

        }

        .toolbar input{

            flex:1;
            min-width:260px;
            padding:13px 18px;
            border-radius:12px;
            border:1px solid #dbe2ea;
            font-size:15px;

        }

        .toolbar select{

            padding:13px 18px;
            border-radius:12px;
            border:1px solid #dbe2ea;
            background:white;
        }

        .table-card{

            background:white;
            border-radius:18px;
            box-shadow:0 8px 24px rgba(0,0,0,.05);
            overflow:hidden;

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        thead{

            background:#2563eb;
            color:white;

        }

        th{

            padding:18px;
            text-align:left;
            font-size:14px;

        }

        td{

            padding:18px;
            border-bottom:1px solid #edf2f7;

        }

        tr:hover{

            background:#f8fbff;

        }

        .candidate{

            display:flex;
            align-items:center;
            gap:15px;

        }

        .avatar{

            width:48px;
            height:48px;
            border-radius:50%;
            background:#2563eb;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;

        }

        .candidate h4{

            margin:0;
            font-size:16px;

        }

        .candidate p{

            margin:4px 0 0;
            color:#64748b;
            font-size:14px;

        }

        .resume-btn{

            background:#eff6ff;
            color:#2563eb;
            padding:9px 14px;
            border-radius:8px;
            text-decoration:none;
            font-weight:600;

        }

        .resume-btn:hover{

            background:#2563eb;
            color:white;

        }

        .badge{

            padding:8px 15px;
            border-radius:30px;
            font-size:13px;
            font-weight:600;
            text-transform:capitalize;

        }

        .badge-applied{

            background:#dbeafe;
            color:#2563eb;

        }

        .badge-reviewed{

            background:#fef3c7;
            color:#b45309;

        }

        .badge-shortlisted{

            background:#ede9fe;
            color:#6d28d9;

        }

        .badge-rejected{

            background:#fee2e2;
            color:#dc2626;

        }

        .badge-hired{

            background:#dcfce7;
            color:#15803d;

        }

        .status-select{

            padding:10px;
            border-radius:10px;
            border:1px solid #cbd5e1;

        }

        .empty-state{

            text-align:center;
            padding:70px 20px;
            color:#64748b;

        }

        .empty-state h2{

            margin:20px 0 10px;

        }

        @media(max-width:768px){

            .page-header{

                flex-direction:column;
                align-items:flex-start;
                gap:20px;

            }

            table{

                min-width:850px;

            }

            .table-card{

                overflow:auto;

            }

        }

    </style>

</head>

<body>

<div id="navbar"></div>

<div class="page">

<div class="container">

<div class="page-header">

<div class="page-title">

<h1>Applicant Management</h1>

<p>Review applications, update hiring status and manage candidates efficiently.</p>

</div>

<a href="dashboard-recruiter.html" class="back-btn">← Back to Dashboard</a>

</div>


<div class="stats-grid">

<div class="stat-card">

<div class="stat-title">Total Applicants</div>

<div class="stat-value" id="totalApplicants">0</div>

</div>

<div class="stat-card">

<div class="stat-title">Shortlisted</div>

<div class="stat-value" id="shortlistedApplicants">0</div>

</div>

<div class="stat-card">

<div class="stat-title">Rejected</div>

<div class="stat-value" id="rejectedApplicants">0</div>

</div>

<div class="stat-card">

<div class="stat-title">Hired</div>

<div class="stat-value" id="hiredApplicants">0</div>

</div>

</div>


<div class="toolbar">

<input
type="text"
id="searchInput"
placeholder="🔍 Search candidate by name...">

<select id="statusFilter">

<option value="all">All Status</option>

<option value="applied">Applied</option>

<option value="reviewed">Reviewed</option>

<option value="shortlisted">Shortlisted</option>

<option value="rejected">Rejected</option>

<option value="hired">Hired</option>

</select>

</div>


<div class="table-card">

<table id="applicants-table" style="display:none;">

<thead>

<tr>

<th>Candidate</th>

<th>Applied On</th>

<th>Resume</th>

<th>Status</th>

<th>Update</th>

</tr>

</thead>

<tbody id="applicants-body">

</tbody>

</table>

<div id="empty-msg"></div>

</div>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>
requireAuth("recruiter");

const params = new URLSearchParams(window.location.search);
const jobId = params.get("jobId");

const table = document.getElementById("applicants-table");
const tbody = document.getElementById("applicants-body");
const emptyMsg = document.getElementById("empty-msg");

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

const totalApplicants = document.getElementById("totalApplicants");
const shortlistedApplicants = document.getElementById("shortlistedApplicants");
const rejectedApplicants = document.getElementById("rejectedApplicants");
const hiredApplicants = document.getElementById("hiredApplicants");

const statuses = [
    "applied",
    "reviewed",
    "shortlisted",
    "rejected",
    "hired"
];

let applicants = [];

function createStatusSelect(app){

    return `
        <select
            class="status-select"
            onchange="updateStatus(${app.id}, this.value)"
        >
            ${statuses.map(status=>`
                <option
                    value="${status}"
                    ${status===app.status ? "selected" : ""}
                >
                    ${status.charAt(0).toUpperCase()+status.slice(1)}
                </option>
            `).join("")}
        </select>
    `;

}

function getInitials(name){

    return name
        .split(" ")
        .map(word=>word[0])
        .join("")
        .substring(0,2)
        .toUpperCase();

}

function updateStatistics(){

    totalApplicants.textContent = applicants.length;

    shortlistedApplicants.textContent =
        applicants.filter(a=>a.status==="shortlisted").length;

    rejectedApplicants.textContent =
        applicants.filter(a=>a.status==="rejected").length;

    hiredApplicants.textContent =
        applicants.filter(a=>a.status==="hired").length;

}

function renderTable(data){

    if(data.length===0){

        table.style.display="none";

        emptyMsg.innerHTML=`
            <div class="empty-state">

                <div style="font-size:70px;">📭</div>

                <h2>No Applicants Found</h2>

                <p>No candidate matches your search or filter.</p>

            </div>
        `;

        return;

    }

    table.style.display="table";

    emptyMsg.innerHTML="";

    tbody.innerHTML=data.map(app=>`

<tr>

<td>

<div class="candidate">

<div class="avatar">

${getInitials(app.candidate_name)}

</div>

<div>

<h4>${app.candidate_name}</h4>

<p>${app.candidate_email}</p>

</div>

</div>

</td>

<td>

${new Date(app.applied_at).toLocaleDateString()}

</td>

<td>

<a
href="${app.resume_path}"
target="_blank"
class="resume-btn">

📄 Resume

</a>

</td>

<td>

<span class="badge badge-${app.status}">

${app.status}

</span>

</td>

<td>

${createStatusSelect(app)}

</td>

</tr>

`).join("");

}

async function loadApplicants(){

    try{

        emptyMsg.innerHTML=`
        <div class="empty-state">

            <div style="font-size:55px;">⏳</div>

            <h3>Loading Applicants...</h3>

        </div>
        `;

        const job=await apiRequest(`/jobs/${jobId}`);

        document.querySelector(".page-title h1").textContent=
        `Applicants - ${job.title}`;

        applicants=await apiRequest(`/applications/job/${jobId}`);

        updateStatistics();

        renderTable(applicants);

    }

    catch(error){

        table.style.display="none";

        emptyMsg.innerHTML=`

        <div class="empty-state">

        <div style="font-size:60px;">❌</div>

        <h2>Unable to Load Applicants</h2>

        <p>${error.message}</p>

        </div>

        `;

    }

}

searchInput.addEventListener("input",filterApplicants);

statusFilter.addEventListener("change",filterApplicants);

function filterApplicants(){

    const search=searchInput.value.toLowerCase();

    const status=statusFilter.value;

    const filtered=applicants.filter(app=>{

        const matchName=

            app.candidate_name.toLowerCase().includes(search);

        const matchStatus=

            status==="all" || app.status===status;

        return matchName && matchStatus;

    });

    renderTable(filtered);

}

async function updateStatus(id,status){

    try{

        await apiRequest(`/applications/${id}/status`,{

            method:"PUT",

            body:{status}

        });

        const app=applicants.find(a=>a.id===id);

        if(app){

            app.status=status;
        }

        updateStatistics();

        filterApplicants();

        showToast("Status updated successfully");

    }

    catch(error){

        alert(error.message);

    }

}

function showToast(message){

    const toast=document.createElement("div");

    toast.innerHTML=message;

    toast.style.position="fixed";

    toast.style.top="30px";

    toast.style.right="30px";

    toast.style.background="#16a34a";

    toast.style.color="white";

    toast.style.padding="14px 24px";

    toast.style.borderRadius="12px";

    toast.style.boxShadow="0 10px 30px rgba(0,0,0,.2)";

    toast.style.zIndex="999";

    document.body.appendChild(toast);

    setTimeout(()=>{

        toast.remove();

    },2500);

}

loadApplicants();

</script>

</body>

</html>
